# Database Connection — for the Docker setup in db/docker-compose.yml
# Use with: java -jar r2rml.jar config.docker.properties
# (For Khalil's native MySQL setup, use config.properties instead.)
connectionURL = jdbc:mysql://localhost:3306/imdb
user = imdb_user
password = imdb_pass
driver = com.mysql.cj.jdbc.Driver

# Mapping and Output
mappingFile = audiovisual_mappings.ttl
outputFile = out.ttl
format = TURTLE

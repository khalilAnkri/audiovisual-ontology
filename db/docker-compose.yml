version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: imdb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: imdb
      MYSQL_USER: imdb_user
      MYSQL_PASSWORD: imdb_pass
    ports:
      - "3306:3306"
    volumes:
      - ./imdb-schema.sql:/docker-entrypoint-initdb.d/imdb-schema.sql
      - ./csv-data:/var/lib/mysql-files
      - mysql_data:/var/lib/mysql
    command: --secure-file-priv=/var/lib/mysql-files
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: imdb-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: imdb_user
      PMA_PASSWORD: imdb_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
